name: Deploy GitHub Pages

# Publishes the repo to GitHub Pages so the manga prototype is viewable at
#   https://<owner>.github.io/<repo>/manga/
# Runs on pushes to the default branch, or on-demand from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # turns Pages on if it isn't already
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                 # publish the whole repo
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
